<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('C:/Users/Huang/Pictures/Hphoto/image3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: white;
        }

        /* 顶部小字 */
        .top-bar {
            text-align: center;
            padding: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* 导航 */
        header {
            padding: 20px 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 30px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* 主布局：左右分栏 */
        main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 40px;
            gap: 40px;
            min-height: calc(100vh - 150px);
        }

        /* 左侧：四个方格 */
        .left-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 45%;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.3);
        }

        .glass-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 右侧内容 */
        .right-content {
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: flex-end;
            text-align: right;
        }

        .hero-title h1 {
            font-size: 72px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            line-height: 1.1;
        }

        .hero-title p {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            margin-top: 8px;
        }

        .intro-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            text-align: left;
        }

        .intro-box h2 {
            font-size: 24px;
            margin-bottom: 12px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        .intro-box p {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <p>欢迎来到我的网站，这是我的个人主页</p>
    </div>

    <header>
        <nav>
            <a href="index.html">首页</a>
            <a href="about.html">关于</a>
        </nav>
    </header>

    <main>
        <div class="left-grid">
            <div class="glass-card">
                <img src="C:/Users/Huang/Pictures/Hphoto/image1.jpg" alt="作品1">
            </div>
            <div class="glass-card">
                <img src="C:/Users/Huang/Pictures/Hphoto/image2.jpg" alt="作品2">
            </div>
            <div class="glass-card">
                <img src="C:/Users/Huang/Pictures/Hphoto/image6.jpg" alt="作品3">
            </div>
            <div class="glass-card">
                <img src="C:/Users/Huang/Pictures/Hphoto/image7.jpg" alt="作品4">
            </div>
        </div>

        <div class="right-content">
            <div class="hero-title">
                <h1>我是H</h1>
                <p>天才</p>
            </div>

            <div class="intro-box">
                <h2>关于我</h2>
                <p>记录生活</p>
                <p>点击关于</p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 H825</p>
    </footer>
</body>
</html>
